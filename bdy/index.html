<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(120deg,#ff758c,#ff7eb3,#ffb199);
background-size:400% 400%;
animation:bg 10s infinite alternate;
color:white;
overflow:hidden;
}

@keyframes bg{
0%{background-position:0% 50%}
100%{background-position:100% 50%}
}

.container{
text-align:center;
max-width:900px;
}

h1{
font-size:70px;
margin-bottom:10px;
animation:fadeDown 1.5s;
}

.subtitle{
font-size:26px;
opacity:0.9;
}

.cake{
font-size:140px;
margin:30px 0;
animation:bounce 2s infinite;
}

button{
padding:18px 40px;
font-size:20px;
border:none;
border-radius:40px;
background:white;
color:#ff4f81;
cursor:pointer;
transition:0.3s;
margin-top:10px;
}

button:hover{
transform:scale(1.1);
}

.nextBtn{
display:none;
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:#333;
padding:40px;
border-radius:20px;
width:500px;
text-align:center;
display:none;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

.popup h2{
color:#ff4f81;
}

.close{
margin-top:20px;
background:#ff4f81;
color:white;
}

.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-20px)}
}

@keyframes fadeDown{
from{
opacity:0;
transform:translateY(-50px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="container">

<h1>Happy Birthday Mahi🎉</h1>

<div class="subtitle">Special Best Friend</div>

<div class="cake">🎂</div>

<button onclick="openSurprise()">Open Your Surprise</button>

<br>

<button class="nextBtn" id="nextBtn" onclick="goNext()">Next Surprise ➜</button>

</div>

<div class="popup" id="popup">

<h2>💖 A Special Message</h2>

<p>
You are one of the most amazing people in my life.  
May your birthday bring you happiness, love and endless smiles. 🎂✨
</p>

<button class="close" onclick="closeSurprise()">Close</button>

</div>

<script>

function openSurprise(){

document.getElementById("popup").style.display="block";

for(let i=0;i<80;i++){

let confetti=document.createElement("div");

confetti.className="confetti";

confetti.style.left=Math.random()*100+"vw";
confetti.style.background="hsl("+Math.random()*360+",100%,50%)";
confetti.style.width="8px";
confetti.style.height="8px";
confetti.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(confetti);

}

}

function closeSurprise(){

document.getElementById("popup").style.display="none";

document.getElementById("nextBtn").style.display="inline-block";

}

function goNext(){
window.location.href="surprise.html";
}


</script>

</body>
</html>
